# Nightly data refresh + GitHub Pages deploy.
# Runs the pipeline (prices update daily ~12:00 UTC at source), commits the
# regenerated site/data, and publishes site/ to Pages.
name: refresh-data

on:
  schedule:
    - cron: '30 13 * * *' # 13:30 UTC = 21:30 MYT, after PriceCatcher's daily refresh
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Run pipeline
        run: node pipeline/run.mjs
        env:
          PIPELINE_NO_CACHE: '1'
      - name: Commit refreshed data
        run: |
          git config user.name 'peta-muda-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add site/data
          git diff --cached --quiet || git commit -m "data: nightly refresh $(date -u +%F)"
          git push
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
