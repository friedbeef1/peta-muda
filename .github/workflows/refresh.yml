# Nightly data refresh. Runs the pipeline (prices update daily ~12:00 UTC at
# source) and commits the regenerated site/data. Deployment is handled by
# Cloudflare Pages, which auto-redeploys the static site/ on every push, so
# this workflow only needs to refresh the data and push.
name: refresh-data

on:
  schedule:
    - cron: '30 13 * * *' # 13:30 UTC = 21:30 MYT, after PriceCatcher's daily refresh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Run pipeline
        run: node pipeline/run.mjs
        env:
          PIPELINE_NO_CACHE: '1'
      - name: Commit refreshed data
        run: |
          git config user.name 'peta-muda-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add site/data
          git diff --cached --quiet || git commit -m "data: nightly refresh $(date -u +%F)"
          git push
